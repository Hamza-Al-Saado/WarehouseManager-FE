<h2>Items</h2>

<div *ngIf="loading">Loading...</div>

<table *ngIf="!loading">
  <thead>
    <tr>
      <th>Name</th>
      <th>Category</th>
      <th>Department</th>
      <th>Quantity</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let item of items">
      <td>{{ item.name }}</td>
      <td>{{ item.category }}</td>
      <td>{{ item.department }}</td>
      <td>{{ item.quantity }}</td>
    </tr>
  </tbody>
</table>
