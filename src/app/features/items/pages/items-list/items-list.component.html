<h2>العناصر</h2>

<div *ngIf="loading">تحميل...</div>

<table *ngIf="!loading">
  <thead>
    <tr>
      <th>الاسم</th>
      <th>الفئة</th>
      <th>القسم</th>
      <th>الكمية</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let item of items">
      <td>{{ item.name }}</td>
      <td>{{ item.category }}</td>
      <td>{{ item.department }}</td>
      <td>{{ item.quantity }}</td>
    </tr>
  </tbody>
</table>
