<div class="page-header">
  <h2>العناصر</h2>
</div>

@if (loading) {
  <div>تحميل...</div>
}

@else {
  <div class="table-container">

    <table class="table">
      <thead>
        <tr>
          <th>الاسم</th>
          <th>التصنيف</th>
          <th>القسم</th>
          <th>الكمية</th>
        </tr>
      </thead>
    
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.name }}</td>
          <td>{{ item.category }}</td>
          <td>{{ item.department }}</td>
          <td>{{ item.quantity }}</td>
        </tr>
      </tbody>
    </table>

  </div>
}
