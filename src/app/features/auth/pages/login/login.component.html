<div class="login-container">
    <div class="login-card">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">
                <img src="assets/images/Syrian-Eagle.svg" alt="logo">
            </div>

            <h2>تسجيل الدخول</h2>
            <p class="subtitle">أهلاً بك من جديد</p>
        </div>

        <form [formGroup]="loginFrom" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" formControlName="email" placeholder="أدخل البريد الإلكتروني" />

                <div class="error" *ngIf="loginFrom.get('email')?.touched && loginFrom.get('email')?.invalid">
                    <small *ngIf="loginFrom.get('email')?.errors?.['required']">
                        البريد الإلكتروني مطلوب
                    </small>
                    <small *ngIf="loginFrom.get('email')?.errors?.['email']">
                        البريد الإلكتروني غير صالح
                    </small>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" formControlName="password" placeholder="أدخل كلمة المرور" />

                <div class="error" *ngIf="loginFrom.get('password')?.touched && loginFrom.get('password')?.invalid">
                    <small *ngIf="loginFrom.get('password')?.errors?.['required']">
                        كلمة المرور مطلوبة
                    </small>
                    <small *ngIf="loginFrom.get('password')?.errors?.['minlength']">
                        يجب أن تكون 6 أحرف على الأقل
                    </small>
                </div>
            </div>

            <button type="submit" class="login-btn" [disabled]="loginFrom.invalid">
                تسجيل الدخول
            </button>

        </form>

    </div>
</div>
